<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan 2026 – Mein Reiseplan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;600;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ─── CSS Variables ─────────────────────────────────────────────────────── */
:root {
  --ink:        #1a1a2e;
  --ink-soft:   #4a4a6a;
  --paper:      #faf8f3;
  --paper-warm: #f3ede0;
  --red:        #c0392b;
  --gold:       #b8860b;
  --gold-light: #f0d060;
  --shadow:     0 4px 24px rgba(26,26,46,0.10);
  --shadow-lg:  0 8px 48px rgba(26,26,46,0.18);
  --radius:     12px;
  --radius-sm:  6px;
}

/* ─── Reset ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Shippori Mincho', serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Hero ───────────────────────────────────────────────────────────────── */
.hero {
  position: relative;
  background: var(--ink);
  color: white;
  min-height: 220px;
  display: flex;
  align-items: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 80% at 80% 50%, rgba(192,57,43,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(184,134,11,0.12) 0%, transparent 60%),
    linear-gradient(135deg, #0d1117 0%, #1a1a2e 50%, #0d1117 100%);
}
.hero-pattern {
  position: absolute; inset: 0; opacity: 0.04;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(255,255,255,0.8) 28px, rgba(255,255,255,0.8) 29px),
    repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(255,255,255,0.8) 28px, rgba(255,255,255,0.8) 29px);
}
.hero-circle {
  position: absolute; right: 60px; top: 50%; transform: translateY(-50%);
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, rgba(192,57,43,0.35) 0%, rgba(192,57,43,0.08) 60%, transparent 100%);
  border: 2px solid rgba(192,57,43,0.4);
  animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: translateY(-50%) scale(1); opacity: 0.7; }
  50%       { transform: translateY(-50%) scale(1.05); opacity: 1; }
}
.hero-inner { position: relative; z-index: 2; padding: 40px 60px; width: 100%; }
.hero-jp { font-family: 'Noto Serif JP', serif; font-size: 13px; letter-spacing: 0.4em; color: rgba(255,255,255,0.45); margin-bottom: 8px; }
.hero-title { font-family: 'Noto Serif JP', serif; font-size: 48px; font-weight: 700; color: white; line-height: 1; }
.hero-title span { color: var(--red); }
.hero-subtitle { margin-top: 12px; font-size: 15px; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; display: flex; align-items: center; gap: 16px; }
.hero-subtitle::before { content: ''; display: inline-block; width: 32px; height: 1px; background: var(--red); }
.hero-stats { display: flex; gap: 32px; margin-top: 24px; }
.hero-stat-num { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: var(--gold-light); line-height: 1; }
.hero-stat-label { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.12em; margin-top: 4px; }

/* ─── Navigation ─────────────────────────────────────────────────────────── */
.nav-wrapper {
  background: white;
  border-bottom: 1px solid rgba(26,26,46,0.08);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(26,26,46,0.06);
  display: flex; align-items: center;
}
.nav-scroll-btn {
  flex-shrink: 0;
  width: 36px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  background: white;
  border: none; cursor: pointer;
  font-size: 16px; color: var(--ink-soft);
  transition: color 0.2s, background 0.2s;
  z-index: 2;
  user-select: none;
}
.nav-scroll-btn:hover { color: var(--red); background: var(--paper-warm); }
.nav-scroll-btn.left { border-right: 1px solid rgba(26,26,46,0.07); }
.nav-scroll-btn.right { border-left: 1px solid rgba(26,26,46,0.07); }
.nav-inner {
  display: flex; align-items: center; overflow-x: auto;
  scrollbar-width: thin; scrollbar-color: rgba(192,57,43,0.3) transparent;
  padding: 0 8px; gap: 0; flex: 1;
  scroll-behavior: smooth;
}
.nav-inner::-webkit-scrollbar { height: 3px; }
.nav-inner::-webkit-scrollbar-track { background: transparent; }
.nav-inner::-webkit-scrollbar-thumb { background: rgba(192,57,43,0.3); border-radius: 2px; }
.nav-tab {
  flex-shrink: 0; padding: 14px 18px;
  font-family: 'Shippori Mincho', serif; font-size: 13px; font-weight: 600;
  color: var(--ink-soft); cursor: pointer; border: none; background: none;
  border-bottom: 3px solid transparent; transition: all 0.2s ease;
  white-space: nowrap; letter-spacing: 0.02em;
}
.nav-tab:hover { color: var(--ink); background: var(--paper-warm); }
.nav-tab.active { color: var(--ink); border-bottom-color: var(--red); font-weight: 700; }
.tab-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

/* ─── Main ───────────────────────────────────────────────────────────────── */
.main { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.view-content { animation: fadeIn 0.3s ease; }

/* ─── Overview Grid ──────────────────────────────────────────────────────── */
.overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 8px; }

.day-card {
  background: white; border-radius: var(--radius); box-shadow: var(--shadow);
  overflow: hidden; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
  border: 1px solid rgba(26,26,46,0.06);
}
.day-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.city-stripe { height: 4px; width: 100%; }
.day-card-header { padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
.day-badge {
  width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-family: 'DM Mono', monospace; font-size: 15px;
  font-weight: 500; flex-shrink: 0; color: white;
}
.day-card-title { font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.3; }
.day-card-date { font-size: 12px; color: var(--ink-soft); font-family: 'DM Mono', monospace; margin-top: 2px; }
.day-card-body { padding: 0 18px 14px; }
.day-card-hotel { font-size: 12px; color: var(--ink-soft); display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.day-card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-family: 'DM Mono', monospace; font-weight: 500; }
.tag-booking { background: #ffeaea; color: var(--red); }
.tag-price   { background: #fff8e1; color: var(--gold); }
.tag-done    { background: #e8f5e9; color: #2d6a4f; }
.tag-todo    { background: #f3e5f5; color: #6a1a7a; }

/* ─── Day View ───────────────────────────────────────────────────────────── */
.day-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
.day-nav-title { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink-soft); letter-spacing: 0.1em; }
.day-view-header { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 32px; flex-wrap: wrap; }
.day-view-number { font-family: 'DM Mono', monospace; font-size: 72px; font-weight: 500; line-height: 1; color: rgba(26,26,46,0.08); flex-shrink: 0; min-width: 100px; }
.day-view-city { font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
.day-view-title { font-family: 'Noto Serif JP', serif; font-size: 32px; font-weight: 700; line-height: 1.2; color: var(--ink); }
.day-view-date { font-size: 15px; color: var(--ink-soft); margin-top: 8px; font-family: 'DM Mono', monospace; }

/* ─── Info Cards ─────────────────────────────────────────────────────────── */
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px; }
.info-card { background: white; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 1px solid rgba(26,26,46,0.06); }
.info-card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--ink-soft); font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.info-card-value { font-size: 16px; font-weight: 600; color: var(--ink); line-height: 1.4; }
.info-card-value.price { font-family: 'DM Mono', monospace; color: var(--gold); font-size: 22px; }
.info-card-value.status-booking { color: var(--red); }
.info-card-value.status-done { color: #2d6a4f; }

/* ─── City Guide ─────────────────────────────────────────────────────────── */
.city-guide { background: white; border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid rgba(26,26,46,0.06); }
.city-guide h3 { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; padding-bottom: 12px; border-bottom: 1px solid rgba(26,26,46,0.08); }
.tip-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.tip-list li { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; line-height: 1.6; color: var(--ink-soft); }
.tip-list li::before { content: '—'; color: var(--red); font-weight: 700; flex-shrink: 0; }

/* ─── Notes ──────────────────────────────────────────────────────────────── */
.notes-section { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-top: 20px; border: 1px solid rgba(26,26,46,0.06); }
.notes-section h4 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--ink-soft); font-family: 'DM Mono', monospace; margin-bottom: 12px; }
.notes-textarea { width: 100%; min-height: 100px; border: 1px solid rgba(26,26,46,0.12); border-radius: var(--radius-sm); padding: 12px 14px; font-family: 'Shippori Mincho', serif; font-size: 14px; color: var(--ink); background: var(--paper); resize: vertical; transition: border-color 0.2s; line-height: 1.6; }
.notes-textarea:focus { outline: none; border-color: var(--red); }

/* ─── Editable Fields ────────────────────────────────────────────────────── */
.editable-field { display: inline-block; border-bottom: 1.5px dashed rgba(192,57,43,0.35); cursor: pointer; transition: border-color 0.2s, background 0.2s; padding: 1px 4px; border-radius: 3px; min-width: 20px; }
.editable-field:hover { border-color: var(--red); background: rgba(192,57,43,0.05); }
.editable-field:focus { outline: 2px solid var(--red); outline-offset: 1px; border-color: transparent; background: white; }

/* ─── Buttons ────────────────────────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius-sm); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; border: none; letter-spacing: 0.04em; }
.btn-primary { background: var(--ink); color: white; }
.btn-primary:hover { background: var(--red); transform: translateY(-1px); }
.btn-secondary { background: var(--paper-warm); color: var(--ink); border: 1px solid rgba(26,26,46,0.15); }
.btn-secondary:hover { background: var(--paper); border-color: var(--red); color: var(--red); }
.btn-group { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

/* ─── Checklist ──────────────────────────────────────────────────────────── */
.checklist { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.check-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--paper); border-radius: var(--radius-sm); border: 1px solid rgba(26,26,46,0.07); transition: background 0.2s; }
.check-item:has(input:checked) { background: #e8f5e9; border-color: rgba(45,106,79,0.2); }
.check-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #2d6a4f; flex-shrink: 0; }
.check-label { font-size: 14px; color: var(--ink); flex: 1; cursor: pointer; }
.check-item:has(input:checked) .check-label { text-decoration: line-through; color: var(--ink-soft); }

/* ─── Food Grid ──────────────────────────────────────────────────────────── */
.food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.food-card { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); border: 1px solid rgba(26,26,46,0.06); }
.food-emoji { font-size: 40px; margin-bottom: 12px; display: block; }
.food-name { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.food-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.7; }

/* ─── Budget ─────────────────────────────────────────────────────────────── */
.budget-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.budget-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-soft); font-family: 'DM Mono', monospace; padding: 10px 16px; border-bottom: 2px solid rgba(26,26,46,0.1); }
.budget-table td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid rgba(26,26,46,0.06); vertical-align: middle; }
.budget-table tr:hover td { background: var(--paper-warm); }
.budget-table .total-row td { font-weight: 700; font-size: 16px; border-top: 2px solid rgba(26,26,46,0.12); border-bottom: none; background: var(--paper-warm); }
.budget-table .price-col { font-family: 'DM Mono', monospace; color: var(--gold); text-align: right; font-weight: 500; }
.progress-bar-wrap { background: rgba(26,26,46,0.08); border-radius: 4px; height: 6px; width: 100%; overflow: hidden; margin-top: 4px; }
.progress-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--red), var(--gold)); transition: width 0.6s ease; }

/* ─── Route Timeline ─────────────────────────────────────────────────────── */
.route-timeline { position: relative; padding-left: 28px; display: flex; flex-direction: column; }
.route-timeline::before { content: ''; position: absolute; left: 8px; top: 12px; bottom: 12px; width: 2px; background: linear-gradient(180deg, var(--red) 0%, rgba(192,57,43,0.15) 100%); }
.route-stop { display: flex; gap: 14px; position: relative; padding: 10px 0; }
.route-stop::before { content: ''; position: absolute; left: -24px; top: 16px; width: 10px; height: 10px; border-radius: 50%; background: white; border: 2px solid var(--red); z-index: 1; }
.route-stop.highlight::before { background: var(--red); width: 12px; height: 12px; left: -25px; top: 15px; }
.route-time { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--red); min-width: 52px; padding-top: 2px; flex-shrink: 0; }
.route-content { flex: 1; }
.route-label { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.3; }
.route-note { font-size: 12px; color: var(--ink-soft); margin-top: 2px; line-height: 1.5; font-family: 'DM Mono', monospace; }

/* ─── Restaurants ────────────────────────────────────────────────────────── */
.restaurant-grid { display: flex; flex-direction: column; gap: 10px; }
.restaurant-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; background: var(--paper); border-radius: var(--radius-sm); border: 1px solid rgba(26,26,46,0.07); }
.restaurant-meal { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.meal-mittag    { background: #fff8e1; color: #b8860b; }
.meal-abend     { background: #ffeaea; color: #c0392b; }
.meal-snack     { background: #e8f5e9; color: #2d6a4f; }
.meal-frueh     { background: #e3eef9; color: #1a4a7a; }
.meal-cafe      { background: #f3e5f5; color: #6a1a7a; }
.meal-unterwegs { background: #eeeeee; color: #4a4a4a; }
.restaurant-info { flex: 1; }
.restaurant-name { font-size: 14px; font-weight: 600; color: var(--ink); }
.restaurant-type { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.restaurant-note { font-size: 11px; color: var(--ink-soft); font-style: italic; margin-top: 2px; }

/* ─── Tips ───────────────────────────────────────────────────────────────── */
.tips-box { background: linear-gradient(135deg, #fffbf0 0%, #fef9ec 100%); border: 1px solid rgba(184,134,11,0.2); border-left: 3px solid var(--gold); border-radius: var(--radius-sm); padding: 16px 18px; }
.tips-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.tips-list li { font-size: 13px; color: var(--ink-soft); line-height: 1.5; display: flex; gap: 8px; align-items: flex-start; }
.tips-list li::before { content: '▸'; color: var(--gold); font-size: 11px; margin-top: 2px; flex-shrink: 0; }

/* ─── Map ────────────────────────────────────────────────────────────────── */
.map-container { border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid rgba(26,26,46,0.1); height: 320px; position: relative; }

/* ─── Dinner Card ────────────────────────────────────────────────────────── */
.dinner-card { background: linear-gradient(135deg, #1a1a2e 0%, #2d1a0e 100%); border-radius: var(--radius); padding: 22px 24px; margin-top: 20px; border: 1px solid rgba(184,134,11,0.3); box-shadow: 0 4px 20px rgba(26,26,46,0.15); position: relative; overflow: hidden; }
.dinner-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(184,134,11,0.15); border: 1px solid rgba(184,134,11,0.4); color: var(--gold-light); font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; margin-bottom: 12px; }
.dinner-badge::before { content: '✦'; font-size: 9px; }
.dinner-heading { font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 700; color: white; margin-bottom: 8px; }
.dinner-text { font-size: 14px; color: rgba(255,255,255,0.72); line-height: 1.7; }

/* ─── Section Heading ────────────────────────────────────────────────────── */
.section-heading { font-family: 'Noto Serif JP', serif; font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-soft); margin: 32px 0 16px; display: flex; align-items: center; gap: 12px; }
.section-heading::after { content: ''; flex: 1; height: 1px; background: rgba(26,26,46,0.1); }

/* ─── Two-col ────────────────────────────────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ─── Toast ──────────────────────────────────────────────────────────────── */
.toast { position: fixed; bottom: 28px; right: 28px; background: var(--ink); color: white; padding: 12px 20px; border-radius: var(--radius-sm); font-family: 'DM Mono', monospace; font-size: 13px; box-shadow: var(--shadow-lg); transform: translateY(80px); opacity: 0; transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999; }
.toast.show { transform: translateY(0); opacity: 1; }

/* ─── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .hero-inner { padding: 28px 20px; }
  .hero-title  { font-size: 32px; }
  .hero-circle { display: none; }
  .main { padding: 20px 16px 60px; }
  .nav-tab { padding: 12px 10px; font-size: 12px; }
  .info-grid { grid-template-columns: 1fr 1fr; }
  .day-view-title { font-size: 24px; }
  .two-col { grid-template-columns: 1fr; }
}

/* ─── Restaurant Guide Cards ─────────────────────────────────────────────── */
.food-card {
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.food-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.food-card-cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--red);
  letter-spacing: 0.08em;
  font-weight: 500;
}
.food-card-cta::after { content: ' →'; }

.food-detail-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 32px;
}
.food-detail-emoji {
  font-size: 56px;
  flex-shrink: 0;
}
.food-detail-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--ink);
}
.food-detail-desc {
  font-size: 15px;
  color: var(--ink-soft);
  margin-top: 6px;
  line-height: 1.7;
}

.city-restaurant-section {
  margin-bottom: 36px;
}
.city-restaurant-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid rgba(26,26,46,0.08);
}
.city-restaurant-stay {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--ink-soft);
  font-weight: 400;
  letter-spacing: 0.08em;

/* ══════════════════════════════════════════════════════════════════════════
   LEAFLET MAP INSTANCES
   ══════════════════════════════════════════════════════════════════════════ */
const leafletMaps = {};

function initDayMap(dayId) {
  const day = REISEPLAN.days[dayId];
  if (!day.mapSpots || day.mapSpots.length === 0) return;

  const containerId = "map-day-" + dayId;
  const container   = document.getElementById(containerId);
  if (!container) return;

  if (leafletMaps[dayId]) {
    leafletMaps[dayId].remove();
    delete leafletMaps[dayId];
  }

  const map = L.map(containerId, { zoomControl: true, scrollWheelZoom: false });
  leafletMaps[dayId] = map;

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  const cityColor = CITY_CONFIG[day.city].color;

  function makeIcon(number) {
    return L.divIcon({
      className: "",
      html: "<div style=\"background:" + cityColor + ";color:white;border:2px solid white;border-radius:50%;width:26px;height:26px;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:12px;font-weight:700;\">" + number + "</div>",
      iconSize:   [26, 26],
      iconAnchor: [13, 13],
      popupAnchor:[0, -16]
    });
  }

  var bounds = [];
  day.mapSpots.forEach(function(spot, idx) {
    L.marker([spot.lat, spot.lon], { icon: makeIcon(idx + 1) })
      .addTo(map)
      .bindPopup("<strong style=\"font-family:sans-serif;font-size:13px\">" + (idx + 1) + ". " + spot.label + "</strong>");
    bounds.push([spot.lat, spot.lon]);
  });

  if (bounds.length > 1) {
    L.polyline(bounds, { color: cityColor, weight: 2.5, opacity: 0.55, dashArray: "6 4" }).addTo(map);
  }

  map.fitBounds(bounds, { padding: [32, 32] });
}

/* ══════════════════════════════════════════════════════════════════════════
   PERSISTENCE
   ══════════════════════════════════════════════════════════════════════════ */
function saveData() {
  const savePayload = REISEPLAN.days.map(function(d) {
    return {
      id:        d.id,
      notes:     d.notes,
      activity:  d.activity,
      hotel:     d.hotel,
      programm:  d.programm,
      preis:     d.preis,
      checklist: d.checklist
    };
  });
  localStorage.setItem("japan2026", JSON.stringify(savePayload));
}

function loadData() {
  var saved = localStorage.getItem("japan2026");
  if (!saved) return;
  try {
    var parsed = JSON.parse(saved);
    parsed.forEach(function(savedDay) {
      var day = REISEPLAN.days[savedDay.id];
      if (!day) return;
      if (savedDay.notes     !== undefined) day.notes     = savedDay.notes;
      if (savedDay.activity  !== undefined) day.activity  = savedDay.activity;
      if (savedDay.hotel     !== undefined) day.hotel     = savedDay.hotel;
      if (savedDay.programm  !== undefined) day.programm  = savedDay.programm;
      if (savedDay.preis     !== undefined) day.preis     = savedDay.preis;
      if (savedDay.checklist !== undefined) day.checklist = savedDay.checklist;
      // dinner, route, restaurants, tips, mapSpots are not persisted –
      // they always come from the source code and cannot be overwritten
    });
  } catch (e) {
    console.error("loadData: JSON parse failed", e);
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════════════════════════════════ */
function showToast(msg) {
  var toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(function() { toast.classList.remove("show"); }, 2200);
}

/* ══════════════════════════════════════════════════════════════════════════
   BUDGET
   ══════════════════════════════════════════════════════════════════════════ */
function calcTotal() {
  return REISEPLAN.days.reduce(function(sum, d) {
    return sum + (parseFloat(d.preis) || 0);
  }, 0);
}

function updateHeroBudget() {
  var el = document.getElementById("total-budget-hero");
  if (el) el.textContent = calcTotal().toLocaleString("de-DE");
}

/* ══════════════════════════════════════════════════════════════════════════
   HELPER: get status
   ══════════════════════════════════════════════════════════════════════════ */
function getProgramStatus(programm) {
  if (!programm) return "none";
  if (programm.includes("ZU BUCHEN") || programm.includes("BUCHEN")) return "ZU BUCHEN";
  if (programm.includes("ZU ORGANISIEREN")) return "ZU ORGANISIEREN";
  return "done";
}

function getProgramStatusClass(programm) {
  var s = getProgramStatus(programm);
  if (s === "ZU BUCHEN" || s === "ZU ORGANISIEREN") return "status-booking";
  return "status-done";
}

function mealClass(meal) {
  var m = meal.toLowerCase();
  if (m.includes("mittag"))  return "meal-mittag";
  if (m.includes("abend"))   return "meal-abend";
  if (m.includes("snack"))   return "meal-snack";
  if (m.includes("café") || m.includes("cafe")) return "meal-cafe";
  if (m.includes("früh") || m.includes("frueh") || m.includes("frühstück")) return "meal-frueh";
  return "meal-unterwegs";
}

/* ══════════════════════════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════════════════════════ */
var activeView = "overview";

/* ══════════════════════════════════════════════════════════════════════════
   NAV
   ══════════════════════════════════════════════════════════════════════════ */
function renderNav() {
  var tabs = [
    { id: "overview", label: "Übersicht",  dot: null },
    { id: "budget",   label: "Budget",     dot: null },
    { id: "food",     label: "Essen 🍣",   dot: null }
  ];

  REISEPLAN.days.forEach(function(d) {
    var label;
    if (d.id === 0)  label = "Anreise";
    else if (d.id === 14) label = "Rückreise";
    else label = "Tag " + d.id;
    tabs.push({ id: "day-" + d.id, label: d.tag + " · " + label, dot: CITY_CONFIG[d.city].color });
  });

  var html = tabs.map(function(t) {
    var dot = t.dot ? "<span class=\"tab-dot\" style=\"background:" + t.dot + "\"></span>" : "";
    var active = activeView === t.id ? " active" : "";
    return "<button class=\"nav-tab" + active + "\" onclick=\"switchView('" + t.id + "')\">" + dot + t.label + "</button>";
  }).join("");

  document.getElementById("nav-tabs").innerHTML = html;
}

/* ══════════════════════════════════════════════════════════════════════════
   SWITCH VIEW
   ══════════════════════════════════════════════════════════════════════════ */
function switchView(viewId) {
  activeView = viewId;
  renderNav();
  renderMainContent();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ══════════════════════════════════════════════════════════════════════════
   MAIN CONTENT ROUTER
   ══════════════════════════════════════════════════════════════════════════ */
function renderMainContent() {
  var main = document.getElementById("main-content");
  main.innerHTML = "";
  if (activeView === "overview") { renderOverview(main); return; }
  if (activeView === "budget")   { renderBudget(main);   return; }
  if (activeView === "food")     { renderFood(main);      return; }
  if (activeView.indexOf("food-detail-") === 0) {
    var foodId = activeView.replace("food-detail-", "");
    renderFoodDetail(main, foodId);
    return;
  }
  if (activeView.indexOf("day-") === 0) {
    var dayId = parseInt(activeView.replace("day-", ""), 10);
    if (!isNaN(dayId) && dayId >= 0 && dayId <= 14) {
      renderDayView(main, dayId);
    }
    return;
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   OVERVIEW
   ══════════════════════════════════════════════════════════════════════════ */
function renderOverview(container) {
  var cards = REISEPLAN.days.map(function(day) {
    var cfg       = CITY_CONFIG[day.city];
    var status    = getProgramStatus(day.programm);
    var doneCount = day.checklist.filter(function(c) { return c.done; }).length;
    var totalCount = day.checklist.length;

    var tags = "";
    if (day.preis > 0) {
      tags += "<span class=\"tag tag-price\">" + day.preis.toLocaleString("de-DE") + " €</span>";
    }
    if (status === "ZU BUCHEN") {
      tags += "<span class=\"tag tag-booking\">Buchen!</span>";
    }
    if (status === "ZU ORGANISIEREN") {
      tags += "<span class=\"tag tag-todo\">Organisieren</span>";
    }
    if (doneCount > 0) {
      tags += "<span class=\"tag tag-done\">" + doneCount + "/" + totalCount + " ✓</span>";
    }

    var badge = (day.id === 0 || day.id === 14) ? "✈" : String(day.id);

    return "<div class=\"day-card\" onclick=\"switchView('day-" + day.id + "')\">" +
      "<div class=\"city-stripe\" style=\"background:" + cfg.color + "\"></div>" +
      "<div class=\"day-card-header\">" +
        "<div class=\"day-badge\" style=\"background:" + cfg.color + "\">" + badge + "</div>" +
        "<div>" +
          "<div class=\"day-card-title\">" + day.title + "</div>" +
          "<div class=\"day-card-date\">" + day.tag + ", " + day.datum + "</div>" +
        "</div>" +
      "</div>" +
      "<div class=\"day-card-body\">" +
        "<div class=\"day-card-hotel\">🏨 " + day.hotel + (day.hotelkette ? " · " + day.hotelkette : "") + "</div>" +
        "<div style=\"font-size:13px;color:var(--ink-soft);line-height:1.5\">" + day.activity + "</div>" +
        "<div class=\"day-card-tags\">" + tags + "</div>" +
      "</div>" +
    "</div>";
  }).join("");

  container.innerHTML = "<div class=\"view-content\">" +
    "<div class=\"section-heading\">Alle Tage im Überblick</div>" +
    "<div class=\"overview-grid\">" + cards + "</div>" +
    "</div>";
}

/* ══════════════════════════════════════════════════════════════════════════
   DAY VIEW
   ══════════════════════════════════════════════════════════════════════════ */
function renderDayView(container, dayId) {
  var day    = REISEPLAN.days[dayId];
  var cfg    = CITY_CONFIG[day.city];
  var guide  = (day.city !== "transit") ? CITY_GUIDES[day.city] : null;
  var prevId = dayId > 0  ? dayId - 1 : null;
  var nextId = dayId < 14 ? dayId + 1 : null;

  // ── Navigation arrows ──────────────────────────────────────────────────
  var prevBtn = prevId !== null
    ? "<button class=\"btn btn-secondary\" onclick=\"switchView('day-" + prevId + "')\">← Tag " + (prevId === 0 ? "0 (Anreise)" : prevId) + "</button>"
    : "<span></span>";
  var nextBtn = nextId !== null
    ? "<button class=\"btn btn-secondary\" onclick=\"switchView('day-" + nextId + "')\">Tag " + (nextId === 14 ? "14 (Rückreise)" : nextId) + " →</button>"
    : "<span></span>";

  // ── Info Cards ─────────────────────────────────────────────────────────
  var infoCards =
    "<div class=\"info-grid\">" +
      "<div class=\"info-card\">" +
        "<div class=\"info-card-label\">Aktivität</div>" +
        "<div class=\"info-card-value\"><span class=\"editable-field\" contenteditable=\"true\" data-field=\"activity\" data-day=\"" + dayId + "\" onblur=\"saveField(this)\">" + day.activity + "</span></div>" +
      "</div>" +
      "<div class=\"info-card\">" +
        "<div class=\"info-card-label\">Unterkunft</div>" +
        "<div class=\"info-card-value\">" +
          "<span class=\"editable-field\" contenteditable=\"true\" data-field=\"hotel\" data-day=\"" + dayId + "\" onblur=\"saveField(this)\">" + day.hotel + "</span>" +
          (day.hotelkette ? "<div style=\"font-size:13px;color:var(--ink-soft);margin-top:4px\">" + day.hotelkette + "</div>" : "") +
        "</div>" +
      "</div>" +
      "<div class=\"info-card\">" +
        "<div class=\"info-card-label\">Programm / Hinweis</div>" +
        "<div class=\"info-card-value " + getProgramStatusClass(day.programm) + "\">" +
          "<span class=\"editable-field\" contenteditable=\"true\" data-field=\"programm\" data-day=\"" + dayId + "\" onblur=\"saveField(this)\">" + (day.programm || "—") + "</span>" +
        "</div>" +
      "</div>" +
      "<div class=\"info-card\">" +
        "<div class=\"info-card-label\">Kosten</div>" +
        "<div class=\"info-card-value price\">" +
          "<span class=\"editable-field\" contenteditable=\"true\" data-field=\"preis\" data-day=\"" + dayId + "\" onblur=\"savePriceField(this)\">" + (day.preis > 0 ? day.preis.toLocaleString("de-DE") : "—") + "</span> €" +
        "</div>" +
      "</div>" +
    "</div>";

  // ── Map ────────────────────────────────────────────────────────────────
  var mapSection = "";
  if (day.mapSpots && day.mapSpots.length > 0) {
    var spotLegend = day.mapSpots.map(function(s, i) {
      var url = mapsLink(s.lat, s.lon, s.label);
      return "<a href=\"" + url + "\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);text-decoration:none;padding:4px 6px;border-radius:6px;transition:background 0.15s;\" onmouseover=\"this.style.background='var(--paper-warm)'\" onmouseout=\"this.style.background='none'\">" +
        "<span style=\"background:" + cfg.color + ";color:white;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:monospace;font-size:11px;font-weight:700;flex-shrink:0\">" + (i + 1) + "</span>" +
        s.label + " <span style=\"font-size:10px;color:#1a56c4;margin-left:2px\">🗺</span>" +
      "</a>";
    }).join("");

    mapSection =
      "<div class=\"section-heading\">Karte – Heutige Stops</div>" +
      "<div class=\"two-col\" style=\"align-items:start;margin-bottom:20px\">" +
        "<div class=\"map-container\" id=\"map-day-" + dayId + "\"></div>" +
        "<div class=\"city-guide\" style=\"padding:20px\">" +
          "<div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-soft);font-family:'DM Mono',monospace;margin-bottom:12px\">Stops heute</div>" +
          "<div style=\"display:flex;flex-direction:column;gap:10px\">" + spotLegend + "</div>" +
          "<div style=\"margin-top:14px;font-size:11px;color:var(--ink-soft);font-style:italic\">&copy; OpenStreetMap</div>" +
        "</div>" +
      "</div>";
  }

  // ── Route ──────────────────────────────────────────────────────────────
  // Build a lookup: label → coordinates from mapSpots
  var spotCoords = {};
  if (day.mapSpots) {
    day.mapSpots.forEach(function(s) {
      spotCoords[s.label] = { lat: s.lat, lon: s.lon };
    });
  }

  var routeSection = "";
  if (day.route && day.route.length > 0) {
    var stops = day.route.map(function(stop) {
      var hlClass  = stop.highlight ? " highlight" : "";
      var isBooked = stop.highlight; // highlighted = confirmed/booked

      // Build Google Maps link: try exact coords first, then search by label
      var mapsUrl = null;
      var coords  = spotCoords[stop.label];
      if (coords) {
        mapsUrl = mapsLink(coords.lat, coords.lon, stop.label);
      } else {
        // Search by label name – strip emoji/special chars
        var searchTerm = stop.label.replace(/^[⭐✈🏨🗺📍]/g, "").trim();
        if (searchTerm.length > 3) mapsUrl = mapsLinkByName(searchTerm);
      }

      var timeEl  = isBooked
        ? "<div class=\"route-time booked\">" + stop.time + "</div>"
        : "<div class=\"route-time\">" + stop.time + "</div>";

      var labelContent = mapsUrl
        ? "<a class=\"maps-link\" href=\"" + mapsUrl + "\" target=\"_blank\" rel=\"noopener\">" + stop.label + "</a>"
        : stop.label;

      var bookedBadge = isBooked ? "<span class=\"booked-badge\">gebucht</span>" : "";

      var labelEl = isBooked
        ? "<div class=\"route-label booked\">" + labelContent + bookedBadge + "</div>"
        : "<div class=\"route-label\">" + labelContent + "</div>";

      return "<div class=\"route-stop" + hlClass + "\">" +
        timeEl +
        "<div class=\"route-content\">" +
          labelEl +
          (stop.note ? "<div class=\"route-note\">" + stop.note + "</div>" : "") +
        "</div>" +
      "</div>";
    }).join("");
    routeSection =
      "<div class=\"section-heading\">Tagesroute <span style=\"font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:0.1em;font-weight:400;\">★ GOLD = gebucht/bestätigt · alle anderen: Claude-Vorschläge</span></div>" +
      "<div class=\"city-guide\"><div class=\"route-timeline\">" + stops + "</div></div>";
  }

  // ── Restaurants ────────────────────────────────────────────────────────
  var restaurantSection = "";
  if (day.restaurants && day.restaurants.length > 0) {
    var items = day.restaurants.map(function(r) {
      return "<div class=\"restaurant-item\">" +
        "<span class=\"restaurant-meal " + mealClass(r.meal) + "\">" + r.meal + "</span>" +
        "<div class=\"restaurant-info\">" +
          "<div class=\"restaurant-name\">" + r.name + "</div>" +
          "<div class=\"restaurant-type\">" + r.type + "</div>" +
          (r.note ? "<div class=\"restaurant-note\">" + r.note + "</div>" : "") +
        "</div>" +
      "</div>";
    }).join("");
    restaurantSection =
      "<div class=\"section-heading\">Restaurants & Essen</div>" +
      "<div class=\"city-guide\"><div class=\"restaurant-grid\">" + items + "</div></div>";
  }

  // ── Tips ───────────────────────────────────────────────────────────────
  var tipsSection = "";
  if (day.tips && day.tips.length > 0) {
    var tipItems = day.tips.map(function(t) { return "<li>" + t + "</li>"; }).join("");
    tipsSection =
      "<div class=\"section-heading\">Tipps & Hinweise</div>" +
      "<div class=\"tips-box\"><ul class=\"tips-list\">" + tipItems + "</ul></div>";
  }

  // ── Checklist ──────────────────────────────────────────────────────────
  var checkItems = day.checklist.map(function(item, idx) {
    return "<label class=\"check-item\">" +
      "<input type=\"checkbox\" " + (item.done ? "checked" : "") + " onchange=\"toggleCheck(" + dayId + ", " + idx + ", this.checked)\">" +
      "<span class=\"check-label\">" + item.text + "</span>" +
    "</label>";
  }).join("");

  var checklistSection =
    "<div class=\"section-heading\">Checkliste</div>" +
    "<div class=\"city-guide\">" +
      "<div class=\"checklist\">" + checkItems + "</div>" +
      "<div class=\"btn-group\"><button class=\"btn btn-secondary\" onclick=\"addCheckItem(" + dayId + ")\">+ Punkt hinzufügen</button></div>" +
    "</div>";

  // ── Dinner card ────────────────────────────────────────────────────────
  var dinnerSection = "";
  if (day.dinner) {
    dinnerSection =
      "<div class=\"dinner-card\">" +
        "<div class=\"dinner-badge\">Claude's Abendessen-Empfehlung</div>" +
        "<div class=\"dinner-heading\">🍽️ Empfehlung für heute Abend</div>" +
        "<div class=\"dinner-text\">" + day.dinner + "</div>" +
      "</div>";
  }

  // ── Notes ──────────────────────────────────────────────────────────────
  var notesSection =
    "<div class=\"notes-section\">" +
      "<h4>Persönliche Notizen</h4>" +
      "<textarea class=\"notes-textarea\" placeholder=\"Hier kannst du eigene Notizen für diesen Tag eintragen...\" onblur=\"saveNotes(" + dayId + ", this.value)\">" + (day.notes || "") + "</textarea>" +
    "</div>";

  // ── City Guide ─────────────────────────────────────────────────────────
  var cityGuideSection = "";
  if (guide) {
    var transportItems = guide.transport.map(function(t) { return "<li>" + t + "</li>"; }).join("");
    var tipGuideItems  = guide.tipps.map(function(t) { return "<li>" + t + "</li>"; }).join("");
    cityGuideSection =
      "<div class=\"section-heading\">City Guide – " + cfg.label + "</div>" +
      "<div class=\"two-col\">" +
        "<div class=\"city-guide\">" +
          "<h3><span>🚇</span> Transport & Orientierung</h3>" +
          "<ul class=\"tip-list\">" + transportItems + "</ul>" +
        "</div>" +
        "<div class=\"city-guide\">" +
          "<h3><span>💡</span> Lokale Tipps</h3>" +
          "<ul class=\"tip-list\">" + tipGuideItems + "</ul>" +
        "</div>" +
      "</div>";
  }

  // ── Assemble ───────────────────────────────────────────────────────────
  container.innerHTML =
    "<div class=\"view-content\">" +
      "<div class=\"day-nav\">" +
        "<div>" + prevBtn + "</div>" +
        "<div class=\"day-nav-title\">" + cfg.emoji + " " + cfg.label.toUpperCase() + " · " + day.tag.toUpperCase() + ", " + day.datum + "</div>" +
        "<div>" + nextBtn + "</div>" +
      "</div>" +
      "<div class=\"day-view-header\">" +
        "<div class=\"day-view-number\" style=\"color:" + cfg.color + "20\">" + String(dayId).padStart(2, "0") + "</div>" +
        "<div>" +
          "<div class=\"day-view-city\" style=\"color:" + cfg.color + "\">" + cfg.emoji + " " + cfg.label + "</div>" +
          "<div class=\"day-view-title\">" + day.title + "</div>" +
          "<div class=\"day-view-date\">" + day.tag + ", " + day.datum + "</div>" +
        "</div>" +
      "</div>" +
      infoCards +
      mapSection +
      routeSection +
      restaurantSection +
      tipsSection +
      checklistSection +
      dinnerSection +
      notesSection +
      cityGuideSection +
    "</div>";

  // Init Leaflet map after DOM is ready
  if (day.mapSpots && day.mapSpots.length > 0) {
    setTimeout(function() { initDayMap(dayId); }, 100);
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   BUDGET VIEW
   ══════════════════════════════════════════════════════════════════════════ */
function renderBudget(container) {
  var total = calcTotal();
  var rows = REISEPLAN.days
    .filter(function(d) { return d.preis > 0; })
    .map(function(d) {
      var cfg = CITY_CONFIG[d.city];
      var pct = total > 0 ? (d.preis / total * 100).toFixed(1) : 0;
      return "<tr onclick=\"switchView('day-" + d.id + "')\" style=\"cursor:pointer\">" +
        "<td><span style=\"display:inline-block;width:10px;height:10px;border-radius:50%;background:" + cfg.color + ";margin-right:8px;vertical-align:middle\"></span>Tag " + d.id + " – " + d.title + "</td>" +
        "<td style=\"color:var(--ink-soft);font-size:13px\">" + d.datum + "</td>" +
        "<td style=\"color:var(--ink-soft);font-size:13px\">" + cfg.label + "</td>" +
        "<td class=\"price-col\">" + d.preis.toLocaleString("de-DE") + " €" +
          "<div class=\"progress-bar-wrap\"><div class=\"progress-bar\" style=\"width:" + pct + "%\"></div></div>" +
        "</td>" +
      "</tr>";
    }).join("");

  var cityTotals = Object.keys(CITY_CONFIG).map(function(key) {
    var cfg       = CITY_CONFIG[key];
    var cityTotal = REISEPLAN.days
      .filter(function(d) { return d.city === key; })
      .reduce(function(s, d) { return s + (d.preis || 0); }, 0);
    if (cityTotal === 0) return "";
    return "<div style=\"text-align:center\">" +
      "<div style=\"font-size:22px;font-family:'DM Mono',monospace;font-weight:500;color:" + cfg.color + "\">" + cityTotal.toLocaleString("de-DE") + " €</div>" +
      "<div style=\"font-size:11px;color:var(--ink-soft);margin-top:3px;letter-spacing:0.1em\">" + cfg.emoji + " " + cfg.label.toUpperCase() + "</div>" +
    "</div>";
  }).join("");

  container.innerHTML =
    "<div class=\"view-content\">" +
      "<div class=\"section-heading\">Reisebudget</div>" +
      "<div class=\"city-guide\">" +
        "<div style=\"display:flex;gap:32px;margin-bottom:24px;flex-wrap:wrap;align-items:flex-end\">" +
          cityTotals +
          "<div style=\"text-align:center;margin-left:auto\">" +
            "<div style=\"font-size:28px;font-family:'DM Mono',monospace;font-weight:500;color:var(--red)\">" + total.toLocaleString("de-DE") + " €</div>" +
            "<div style=\"font-size:11px;color:var(--ink-soft);margin-top:3px;letter-spacing:0.1em\">GESAMT GEBUCHT</div>" +
          "</div>" +
        "</div>" +
        "<table class=\"budget-table\">" +
          "<thead><tr><th>Bezeichnung</th><th>Datum</th><th>Stadt</th><th style=\"text-align:right\">Betrag</th></tr></thead>" +
          "<tbody>" + rows + "</tbody>" +
          "<tfoot><tr class=\"total-row\"><td colspan=\"3\">Gesamt</td><td class=\"price-col\">" + total.toLocaleString("de-DE") + " €</td></tr></tfoot>" +
        "</table>" +
      "</div>" +
      "<div style=\"margin-top:12px;font-size:12px;color:var(--ink-soft);font-family:'DM Mono',monospace\">* Preise in der Tagesansicht direkt bearbeitbar</div>" +
    "</div>";
}

/* ══════════════════════════════════════════════════════════════════════════
   FOOD WISH CHECKLIST
   ══════════════════════════════════════════════════════════════════════════ */
var FOOD_WISH_LIST = [
  "Sushi", "Shabu-Shabu", "Ramen", "Wagyu / Teppanyaki", "Tempura",
  "Izakaya (gesellige Pubs)", "Yakiniku (Tischgrill)", "Okonomiyaki",
  "Tonkatsu (paniertes Schweinekotelett)", "Soba / Udon Nudeln",
  "Yakitori (Gegrillte Huehnerspiesse)", "Gyoza (Gebratene Teigtaschen)",
  "Curry Rice (Kare Raisu)", "Takoyaki (Oktopusbaellchen)"
];

function renderFoodChecklist() {
  var saved = localStorage.getItem("foodChecklist2026");
  var done  = saved ? JSON.parse(saved) : [];
  return FOOD_WISH_LIST.map(function(item, idx) {
    var checked = done.indexOf(idx) >= 0;
    return "<label class=\"check-item\">" +
      "<input type=\"checkbox\" " + (checked ? "checked" : "") +
      " onchange=\"toggleFoodItem(" + idx + ", this.checked)\">" +
      "<span class=\"check-label\">" + item + "</span>" +
    "</label>";
  }).join("");
}

function toggleFoodItem(idx, checked) {
  var saved = localStorage.getItem("foodChecklist2026");
  var done  = saved ? JSON.parse(saved) : [];
  if (checked && done.indexOf(idx) < 0) done.push(idx);
  if (!checked) done = done.filter(function(i) { return i !== idx; });
  localStorage.setItem("foodChecklist2026", JSON.stringify(done));
  showToast("Essen-Checkliste gespeichert");
}

/* ══════════════════════════════════════════════════════════════════════════
   LIVE TICKER
   ══════════════════════════════════════════════════════════════════════════ */

// Mapping: JS day-of-week (0=Sun) for each trip day, with real dates
var TRIP_DATES = [
  { id: 0,  year: 2026, month: 5, day: 15 },
  { id: 1,  year: 2026, month: 5, day: 16 },
  { id: 2,  year: 2026, month: 5, day: 17 },
  { id: 3,  year: 2026, month: 5, day: 18 },
  { id: 4,  year: 2026, month: 5, day: 19 },
  { id: 5,  year: 2026, month: 5, day: 20 },
  { id: 6,  year: 2026, month: 5, day: 21 },
  { id: 7,  year: 2026, month: 5, day: 22 },
  { id: 8,  year: 2026, month: 5, day: 23 },
  { id: 9,  year: 2026, month: 5, day: 24 },
  { id: 10, year: 2026, month: 5, day: 25 },
  { id: 11, year: 2026, month: 5, day: 26 },
  { id: 12, year: 2026, month: 5, day: 27 },
  { id: 13, year: 2026, month: 5, day: 28 },
  { id: 14, year: 2026, month: 5, day: 29 }
];

function parseStopTime(timeStr) {
  // Parses "08:11", "~10:00", "Früh", "Morgen", "Ganzer Tag", "Abend"
  if (!timeStr) return null;
  var clean = timeStr.replace("~", "").trim();
  var match  = clean.match(/^(\d{1,2}):(\d{2})/);
  if (match) return parseInt(match[1], 10) * 60 + parseInt(match[2], 10);
  if (clean === "Früh")       return 7 * 60;
  if (clean === "Morgen")     return 9 * 60;
  if (clean === "Ganzer Tag") return 10 * 60;
  if (clean === "Abend")      return 18 * 60;
  return null;
}

function getTripStatus() {
  // Use Japan time (UTC+9)
  var now      = new Date();
  var jpOffset = 9 * 60; // minutes
  var utcMin   = now.getUTCHours() * 60 + now.getUTCMinutes();
  var jpMin    = (utcMin + jpOffset) % (24 * 60);
  var jpHour   = Math.floor(jpMin / 60);

  // Build a Date in Japan timezone for date comparison
  var jpMs    = now.getTime() + (9 * 3600 * 1000);
  var jpDate  = new Date(jpMs);
  var jpYear  = jpDate.getUTCFullYear();
  var jpMonth = jpDate.getUTCMonth() + 1; // 1-based
  var jpDay   = jpDate.getUTCDate();

  // Find which trip day we are on
  var todayTrip = null;
  for (var i = 0; i < TRIP_DATES.length; i++) {
    var td = TRIP_DATES[i];
    if (td.year === jpYear && td.month === jpMonth && td.day === jpDay) {
      todayTrip = td;
      break;
    }
  }

  // Before trip
  if (!todayTrip) {
    var firstDate = new Date(Date.UTC(2026, 4, 15)); // May 15 2026
    var lastDate  = new Date(Date.UTC(2026, 4, 29));
    var nowUTC    = new Date(Date.UTC(jpYear, jpMonth - 1, jpDay));
    if (nowUTC < firstDate) {
      var diffDays = Math.ceil((firstDate - nowUTC) / (1000 * 60 * 60 * 24));
      return {
        phase:   "before",
        daysLeft: diffDays,
        current: "Noch " + diffDays + " Tag" + (diffDays === 1 ? "" : "e") + " bis zur Abreise",
        next:    "15. Mai 2026 – Abflug München 12:30 Uhr",
        dayId:   null
      };
    }
    if (nowUTC > lastDate) {
      return { phase: "after", current: "Reise beendet – Schöne Erinnerungen! 🏮", next: "", dayId: null };
    }
    return { phase: "between", current: "Reise läuft", next: "", dayId: null };
  }

  // We are on a trip day – find current stop
  var day   = REISEPLAN.days[todayTrip.id];
  var stops = day.route || [];
  var currentStop = null;
  var nextStop    = null;

  for (var s = 0; s < stops.length; s++) {
    var stopMin = parseStopTime(stops[s].time);
    var nextMin = (s + 1 < stops.length) ? parseStopTime(stops[s + 1].time) : null;

    if (stopMin === null) continue;
    if (jpMin >= stopMin && (nextMin === null || jpMin < nextMin)) {
      currentStop = stops[s];
      nextStop    = (s + 1 < stops.length) ? stops[s + 1] : null;
      break;
    }
  }

  // Before first stop of the day
  if (!currentStop && stops.length > 0) {
    currentStop = { label: "Tag " + todayTrip.id + " startet bald", time: "" };
    nextStop    = stops[0];
  }

  return {
    phase:   "during",
    dayId:   todayTrip.id,
    city:    day.city,
    datum:   day.datum,
    current: currentStop ? currentStop.label : day.title,
    next:    nextStop    ? nextStop.label    : "Ende des Tages",
    currentTime: currentStop ? currentStop.time : "",
    nextTime:    nextStop    ? nextStop.time    : ""
  };
}

function renderLiveTicker() {
  var el = document.getElementById("live-ticker");
  if (!el) return;

  var status = getTripStatus();

  if (status.phase === "before") {
    el.innerHTML =
      "<div class=\"ticker-dot\" style=\"background:#f39c12;box-shadow:0 0 0 3px rgba(243,156,18,0.25)\"></div>" +
      "<div class=\"ticker-now\">" +
        "<div class=\"ticker-label\">Countdown</div>" +
        "<div class=\"ticker-value\">" + status.current + " ✈️</div>" +
        "<div class=\"ticker-date\">Abflug: 15. Mai 2026, 12:30 Uhr · München MUC</div>" +
      "</div>" +
      "<div class=\"ticker-next\">" +
        "<div class=\"ticker-label\">Erster Stop</div>" +
        "<div class=\"ticker-value\">" + status.next + "</div>" +
      "</div>";
    return;
  }

  if (status.phase === "after") {
    el.innerHTML =
      "<div class=\"ticker-dot\" style=\"background:#95a5a6;box-shadow:none\"></div>" +
      "<div class=\"ticker-now\"><div class=\"ticker-value\">" + status.current + "</div></div>";
    return;
  }

  if (status.phase === "during") {
    var cfg  = CITY_CONFIG[status.city] || { emoji: "📍", label: "" };
    var timeNow  = status.currentTime ? status.currentTime + " · " : "";
    var timeNext = status.nextTime    ? status.nextTime + " · "    : "";
    el.innerHTML =
      "<div class=\"ticker-dot\"></div>" +
      "<div class=\"ticker-now\">" +
        "<div class=\"ticker-label\">Jetzt – " + cfg.emoji + " " + cfg.label + "</div>" +
        "<div class=\"ticker-value\">" + timeNow + status.current + "</div>" +
        "<div class=\"ticker-date\">" + status.datum + "</div>" +
      "</div>" +
      "<div class=\"ticker-next\">" +
        "<div class=\"ticker-label\">Danach</div>" +
        "<div class=\"ticker-value\">" + timeNext + status.next + "</div>" +
      "</div>" +
      "<button class=\"ticker-daylink\" onclick=\"switchView('day-" + status.dayId + "')\">→ Tag " + status.dayId + " öffnen</button>";
    return;
  }
}
